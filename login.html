<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — FEJAB</title>
  <meta name="description" content="Accede a tu cuenta en FEJAB - Federación de Jóvenes Adventistas de Boyacá Norte" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Red+Hat+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="pages.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <img src="logo feja horizontal blanco.png" alt="FEJAB Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
        <div class="logo-fallback" style="display:none;">
          <span class="logo-text">Jóvenes Adventistas <strong>FEJAB</strong></span>
        </div>
      </a>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">← Inicio</a></li>
        <li><a href="registro.html" class="nav-link nav-btn-login">Registrarse</a></li>
      </ul>
    </div>
  </nav>

  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
          <img src="logo feja horizontal blanco.png" alt="FEJAB" onerror="this.style.display='none';" />
          <div class="auth-logo-text">FEJAB</div>
        </div>

        <h1 class="auth-title">Iniciar Sesión</h1>
        <p class="auth-subtitle">Accede a tu cuenta del ministerio juvenil</p>

        <!-- Demo info -->
        <div style="background:rgba(234,179,8,0.12); border:1px solid rgba(234,179,8,0.3); border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:0.8rem; color:rgba(255,255,255,0.7);">
          <i class="fa fa-info-circle" style="color:#EAB308"></i>
          Demo: <strong style="color:#EAB308">demo@fejab.org</strong> / <strong style="color:#EAB308">fejab2025</strong>
        </div>

        <!-- Alerta -->
        <div class="alert" id="loginAlert" role="alert"></div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="loginEmail">Correo electrónico</label>
            <input
              type="email"
              id="loginEmail"
              class="form-input"
              placeholder="tu@correo.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="loginPassword">Contraseña</label>
            <div class="input-icon-wrap">
              <input
                type="password"
                id="loginPassword"
                class="form-input"
                placeholder="Tu contraseña"
                autocomplete="current-password"
                required
              />
              <i class="fa fa-eye input-icon toggle-password" data-target="loginPassword"></i>
            </div>
          </div>

          <div style="text-align:right; margin-bottom:16px;">
            <a href="#" style="font-size:0.8rem; color:rgba(234,179,8,0.8);">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit" class="auth-btn">
            <i class="fa fa-sign-in-alt"></i> Iniciar sesión
          </button>
        </form>

        <div class="auth-divider"><span>¿No tienes cuenta?</span></div>

        <div class="auth-link">
          <a href="registro.html">Crear una cuenta nueva →</a>
        </div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
